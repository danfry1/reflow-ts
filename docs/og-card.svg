<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8efde"/>
      <stop offset="1" stop-color="#ead4b3"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e46d2f" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#e46d2f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed warm background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Thin accent line at top -->
  <rect y="0" width="1200" height="4" fill="#e46d2f" opacity="0.6"/>

  <!-- Subtle watermark badge top-right -->
  <g transform="translate(840, 100)">
    <rect width="280" height="280" rx="64" fill="#183128" opacity="0.06"/>
    <text x="140" y="210" fill="#183128" opacity="0.08" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="200" font-weight="800" text-anchor="middle">R</text>
  </g>

  <!-- Brand -->
  <text x="80" y="100" fill="#183128" font-family="'Inter', 'SF Pro Display', 'Avenir Next', sans-serif" font-size="22" font-weight="700" letter-spacing="3">REFLOW</text>
  <text x="80" y="128" fill="#7a8c83" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16">reflow-ts</text>

  <!-- Headline -->
  <text x="80" y="240" fill="#183128" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">Durable workflow</text>
  <text x="80" y="320" fill="#183128" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">execution for</text>
  <text x="80" y="400" fill="#183128" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">TypeScript.</text>

  <!-- Subtitle -->
  <text x="80" y="468" fill="#51655b" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24">SQLite-backed workflows with typed steps, retries, and crash recovery.</text>

  <!-- Bottom badges — minimal, dot-separated -->
  <text x="80" y="564" fill="#e46d2f" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">CRASH SAFE</text>
  <circle cx="216" cy="559" r="2" fill="#c4b6a0"/>
  <text x="234" y="564" fill="#7a8c83" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">ZERO INFRA</text>
  <circle cx="380" cy="559" r="2" fill="#c4b6a0"/>
  <text x="398" y="564" fill="#7a8c83" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">TYPESCRIPT</text>
  <circle cx="546" cy="559" r="2" fill="#c4b6a0"/>
  <text x="564" y="564" fill="#7a8c83" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">SQLITE</text>

  <!-- Bottom border accent -->
  <rect y="626" width="1200" height="4" fill="#e46d2f" opacity="0.3"/>
</svg>
